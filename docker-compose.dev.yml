# Self-contained LOCAL stack: API + Postgres + Redis, brought up with one command.
#   docker compose -f docker-compose.dev.yml up --build
# The API builds from the local Dockerfile (no registry needed) and runs migrations on start.
# API → http://localhost:4000/api/v1 · health → /api/v1/health
#
# This is for local development/demo only. Production uses docker-compose.yml (prebuilt image
# on a shared network with externally-managed Postgres/Redis). Postgres/Redis here are NOT
# published to the host, so they won't clash with anything already running on 5432/6379.

services:
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: rival
        volumes:
            - rival-dev-db:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d rival']
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 10

    backend:
        build: .
        restart: unless-stopped
        environment:
            NODE_ENV: development
            PORT: '4000'
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rival?sslmode=disable
            REDIS_HOST: redis
            REDIS_PORT: '6379'
            ACCESS_TOKEN_SECRET: dev-access-secret-change-me
            REFRESH_TOKEN_SECRET: dev-refresh-secret-change-me
            FRONTEND_URL: http://localhost:3000
            # No RESEND_API_KEY in dev → OTP/invite emails are logged to the container console
            # instead of sent, and the dev OTP is always 000000.
        ports:
            - '4000:4000'
        volumes:
            - rival-dev-uploads:/app/uploads
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy

volumes:
    rival-dev-db:
    rival-dev-uploads:
